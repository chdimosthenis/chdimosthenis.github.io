# Social media links and usernames.
# Order here = display order in the navbar/search.
# See jekyll-socials plugin: https://github.com/george-gca/jekyll-socials
#
# Two formats coexist below:
#   1. Built-in keys with a flat string value — the plugin supplies the icon
#      and URL template (e.g. email, scholar_userid, orcid_id, scopus_id).
#   2. Custom keys with a hash containing `logo`, `title`, `url` — used for
#      academic platforms not in the plugin's built-in list. The key MUST NOT
#      collide with a built-in key (see SOCIAL_URLS in jekyll-socials.rb),
#      otherwise the plugin enters the custom-logo-override branch and tries
#      to build the URL from its own template instead of using `url:`.

