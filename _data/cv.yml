  website: https://chdimosthenis.github.io
  summary: >
    Dr Dimos Chatzinikolaou is an Adjunct Faculty member at the AACSB-accredited
    School of Business of the University of Nicosia and a member of the Knowledge
    Management, Innovation and Strategy Center (KISC). His research advances
    evolutionary and systems-oriented macro–meso–micro approaches to international
    political economy, business ecosystems, entrepreneurship, and sectoral
    transformation, with particular emphasis on energy. His work has been published
    in ABS-ranked journals, including *Strategy & Leadership*, *The Journal of
    Entrepreneurship*, *Journal of the Knowledge Economy*, *Journal of Economic
    Integration*, and *Journal of Entrepreneurship in Emerging Economies*.

